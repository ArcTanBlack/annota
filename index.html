<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Video Note System Tag Context Menu</title>
<style>
:root { --bg:#1a1a1a; --text:#eee; --accent:#3498db; }
body { font-family:sans-serif; background:var(--bg); color:var(--text); display:flex; gap:20px; padding:20px; margin:0; height:100vh; }
#main { flex:2; display:flex; flex-direction:column; }
#side { flex:1; border-left:1px solid #444; display:flex; flex-direction:column; }
#player { width:100%; aspect-ratio:16/9; background:black; position:relative; }
#scrubber { height:20px; background:#333; position:relative; margin-top:10px; cursor:pointer; }
#playhead { position:absolute; width:3px; height:100%; background:#00aaff; }
.marker { position:absolute; width:8px; height:100%; background:red; transform:translateX(-50%); cursor:pointer; }
#viewer { margin-top:10px; background:#222; padding:10px; min-height:50px; }
.tab-buttons { display:flex; border-bottom:1px solid #444; }
.tab-buttons button { flex:1; padding:8px; background:#222; color:white; border:none; cursor:pointer; }
.tab-buttons button.active { background:#333; border-bottom:2px solid var(--accent); }
.tab-content { flex:1; overflow-y:auto; padding:5px; background:#1a1a1a; display:none; }
.comment { background:#2a2a2a; padding:10px; margin-bottom:10px; cursor:pointer; border-radius:4px; position:relative; }
.tags-tray { display:none; margin-top:5px; }
.tags-tray.visible { display:block; }
.tag { background:var(--accent); padding:2px 6px; margin:3px; display:inline-block; cursor:pointer; border-radius:3px; }
#contextMenu, #noteModal, #confirmPopup, #preview {
  position:fixed; background:#222; border:1px solid #444; display:none; z-index:2000; padding:8px;
}
#contextMenu div, #noteModal div, #confirmPopup div { cursor:pointer; padding:6px 10px; }
#contextMenu div:hover, #noteModal div:hover, #confirmPopup div:hover { background:#3498db; }
#preview { width:260px; height:150px; pointer-events:auto; border:2px solid var(--accent); background:black; }
#confirmPopup button { margin:5px 3px 0 0; }
textarea { width:200px; height:60px; background:#111; color:white; border:1px solid #444; }
input.tagInput { width:100%; margin-top:5px; padding:4px; background:#111; color:white; border:1px solid #444; }
.breadcrumbs { margin-bottom:5px; display:flex; gap:5px; flex-wrap:wrap; }
.breadcrumbs span { background:#222; padding:2px 6px; border-radius:3px; cursor:pointer; }
</style>
</head>
<body>

<div id="main">
<div class="breadcrumbs" id="windowCrumbs"></div>
<div class="breadcrumbs" id="playerCrumbs"></div>
<div class="breadcrumbs" id="commentCrumbs"></div>
<button onclick="goBack('window')">⬅ Back Window</button>
<button onclick="goBack('player')">⬅ Back Player</button>
<button onclick="goBack('comment')">⬅ Back Comment</button>
<div id="player"></div>
<div id="scrubber"><div id="playhead"></div></div>
<div id="viewer">Click a comment...</div>
</div>

<div id="side">
<div class="tab-buttons">
 <button class="active" onclick="openTab('playlist', this)">Playlist</button>
 <button onclick="openTab('comments', this)">Comments</button>
 <button onclick="openTab('other', this)">Other</button>
</div>
<div id="playlist" class="tab-content">Playlist content...</div>
<div id="comments" class="tab-content"></div>
<div id="other" class="tab-content">Other content</div>
</div>

<div id="preview"></div>
<div id="contextMenu"></div>
<div id="noteModal"></div>
<div id="confirmPopup">
  <div id="confirmText"></div>
  <button id="confirmYes">Yes</button>
  <button id="confirmNo">No</button>
</div>

const state={history:[],windowHist:[],playerHist:[],commentHist:[]};
let player, previewPlayer, previewMode=null;
let pendingTime=0;

function getID(u){return u.match(/embed\/(.*?)\?/)[1];}
function onYouTubeIframeAPIReady(){ loadVideo(db.current,0,false); }
function getTime(){return player && typeof player.getCurrentTime==='function'?player.getCurrentTime():0;}

function loadVideo(v, t = 0, trackHistory = true, origin = 'player') {

    // Track history BEFORE switching video
    if (trackHistory && player) {
        if (origin === 'player') state.playerHist.push({ v: db.current, t: getTime() });
        if (origin === 'window') state.windowHist.push({ v: db.current, t: getTime() });
        if (origin === 'comment') state.commentHist.push({ v: db.current, t: getTime() });
    }

    // ✅ Always set current FIRST
    db.current = v;

    // If player already exists
    if (player && typeof player.loadVideoById === 'function') {
        player.loadVideoById(getID(db.videos[v].url), t);

        // ✅ Ensure render happens AFTER switch
        setTimeout(() => {
            render();
            updateBreadcrumbs();
        }, 0);

    } else {
        // First-time initialization
        player = new YT.Player('player', {
            videoId: getID(db.videos[v].url),
            events: {
                onReady: (e) => {
                    player = e.target;

                    track();

                    // ✅ First safe render
                    render();
                    updateBreadcrumbs();
                }
            }
        });
    }
}
function goBack(origin){
 let hist=null;
 if(origin==='player') hist=state.playerHist;
 if(origin==='window') hist=state.windowHist;
 if(origin==='comment') hist=state.commentHist;
 if(!hist || hist.length===0) return;
 let h=hist.pop();
 loadVideo(h.v,h.t,false,origin);
}

function updateBreadcrumbs(){
 const w=document.getElementById('windowCrumbs'), p=document.getElementById('playerCrumbs'), c=document.getElementById('commentCrumbs');
 w.innerHTML=state.windowHist.map(h=>`<span onclick="loadVideo('${h.v}',${h.t},false,'window')">${db.videos[h.v].title}</span>`).join('');
 p.innerHTML=state.playerHist.map(h=>`<span onclick="loadVideo('${h.v}',${h.t},false,'player')">${db.videos[h.v].title}</span>`).join('');
 c.innerHTML=state.commentHist.map(h=>`<span onclick="loadVideo('${h.v}',${h.t},false,'comment')">${db.videos[h.v].title}</span>`).join('');
}

function track(){function loop(){let t=getTime(); let d=db.videos[db.current].duration; document.getElementById('playhead').style.left=(t/d*100)+"%"; requestAnimationFrame(loop);} loop();}

const scrubber=document.getElementById('scrubber');
scrubber.ondblclick=e=>{
 e.stopPropagation();
 let r=scrubber.getBoundingClientRect();
 pendingTime=((e.clientX-r.left)/r.width)*db.videos[db.current].duration;
 const ctx=document.getElementById('contextMenu');
 ctx.style.display='block';
 ctx.style.left=e.pageX+'px';
 ctx.style.top=e.pageY+'px';
 ctx.innerHTML=`<div onclick="addMarker()">Add Marker</div>
<div onclick="openNoteModal()">Add Comment/Note</div>
<div onclick="jumpTo()">Jump Here</div>`;
};

function addMarker(){db.annotations.push({vid:db.current,time:pendingTime}); closeAll(); render();}
function jumpTo(){player.seekTo(pendingTime,true); closeAll();}

function openNoteModal(){
 const modal=document.getElementById('noteModal');
 modal.style.display='block';
 modal.style.left='40%'; modal.style.top='30%';
 modal.innerHTML=`<div>Add Note @ ${pendingTime.toFixed(1)}s</div>
<textarea id='noteText'></textarea>
<input class='tagInput' placeholder='Add comma-separated tags (label[:vid:time])'>
<br><button onclick='saveNote()'>Save</button>`;
 document.getElementById('noteText').focus();
}

function saveNote(){
 let text=document.getElementById('noteText').value;
 let tagsInput=document.querySelector('.tagInput').value.split(',').map(s=>s.trim()).filter(s=>s);
 let tags=tagsInput.map(t=>{let parts=t.split(':'); return {label:parts[0], vid:parts[1]||'', time:parseFloat(parts[2]||0)}});

 if(!text) return;
 if(!db.comments[db.current]) db.comments[db.current]=[];
 db.comments[db.current].push({text,time:pendingTime,tags:tags});
 db.annotations.push({vid:db.current,time:pendingTime});
 closeAll(); render();
}

function closeAll(){
 document.getElementById('contextMenu').style.display='none';
 document.getElementById('noteModal').style.display='none';
 document.getElementById('confirmPopup').style.display='none';
 if(previewMode==='hover') hidePreview();
}

window.onclick=(e)=>{if(!document.getElementById('contextMenu').contains(e.target)&&!document.getElementById('noteModal').contains(e.target)) closeAll();};

function preview(e,vid,time,text,mode="hover"){
 previewMode = mode;
 const previewBox = document.getElementById('preview');
 previewBox.style.display='block';
 previewBox.style.left=(e.clientX+10)+'px';
 previewBox.style.top=(e.clientY+10)+'px';
 previewBox.innerHTML='';

 if(text){
     let textEl=document.createElement('div');
     textEl.style.color='white'; textEl.style.marginBottom='4px';
     textEl.innerText=text; previewBox.appendChild(textEl);
 }

 if(mode==="manual"){
     let closeBtn=document.createElement('button');
     closeBtn.innerText='✖';
     closeBtn.style.position='absolute';
     closeBtn.style.top='4px';
     closeBtn.style.right='4px';
     closeBtn.onclick=()=>{ previewBox.style.display='none'; previewMode=null; };
     previewBox.appendChild(closeBtn);
 }

 if(vid){
     if(!previewPlayer){
         previewPlayer=new YT.Player('preview',{
             videoId:getID(db.videos[vid].url),
             playerVars:{autoplay:1,mute:1},
             events:{onReady:(p)=>{previewPlayer=p.target; previewPlayer.seekTo(time||0,true);}}
         });
     } else if(typeof previewPlayer.loadVideoById==='function'){
         previewPlayer.loadVideoById(getID(db.videos[vid].url),time||0);
     }
 }
}

function hidePreview(){
 if(previewMode==='hover'){
     document.getElementById('preview').style.display='none';
     previewMode=null;
 }
}

function openTagContext(e,tag){
 e.stopPropagation();
 const ctx=document.getElementById('contextMenu');
 ctx.style.display='block';
 ctx.style.left=e.pageX+'px';
 ctx.style.top=e.pageY+'px';
 ctx.innerHTML=`<div onclick="loadVideo('${tag.vid}',${tag.time||0})">Open in Current Player</div>
<div onclick="window.open('${db.videos[tag.vid]?.url}','_blank')">Open in New Tab</div>
<div onclick="preview(event,'${tag.vid}',${tag.time||0},'${tag.label}','manual')">Open in Preview Mini</div>`;
}

function render(){
 openTab('comments',document.querySelector('.tab-buttons button:nth-child(2)'));
 const comContainer=document.getElementById('comments'); 
 comContainer.innerHTML='';
 scrubber.querySelectorAll('.marker').forEach(m=>m.remove());

 db.comments[db.current]?.forEach(c=>{
 //alert("Inrender dbCurrent="+db.current+" comments="+db.comments[db.current])
  let div=document.createElement('div'); 
  div.className='comment';
  div.innerHTML=`<div>${c.text}</div>`;

  let tray=null;
  if(c.tags.length>0){
     tray=document.createElement('div'); 
     tray.className='tags-tray';
     c.tags.forEach(t=>{
       let tagEl=document.createElement('span'); 
       tagEl.className='tag'; 
       tagEl.innerText=t.label;

       // Hover preview for tag
       tagEl.onmouseenter = (ev) => { if(t.vid) preview(ev, t.vid, t.time||0, t.label,'hover'); };
       tagEl.onmouseleave = hidePreview;

       tagEl.onclick=ev => openTagContext(ev, t);
       tray.appendChild(tagEl);
     });
     div.appendChild(tray);
  }

  div.onclick = (ev) => {
      document.getElementById('viewer').innerText = c.text + " @ " + c.time + "s";
      if(tray) tray.classList.add('visible');

      state.commentHist.push({v:db.current,t:c.time});
      updateBreadcrumbs();

      setTimeout(()=>{
          const popup=document.getElementById('confirmPopup');
          document.getElementById('confirmText').innerText = `Jump to ${c.time.toFixed(1)}s in current video?`;
          popup.style.left=ev.clientX+'px';
          popup.style.top=ev.clientY+'px';
          popup.style.display='block';
          document.getElementById('confirmYes').onclick=()=>{player.seekTo(c.time,true); popup.style.display='none';};
          document.getElementById('confirmNo').onclick=()=>{popup.style.display='none';};
      },0);
  };

  div.onmouseenter=e=>{
      const ctx=document.getElementById('contextMenu');
      ctx.style.display='block';
      ctx.style.left=(e.clientX+10)+'px';
      ctx.style.top=(e.clientY+10)+'px';
      ctx.innerHTML=`<div id="previewOption">Preview</div><div>Other Option</div>`;
      const previewOption=document.getElementById('previewOption');
      previewOption.onmouseenter=()=>preview(e,db.current,c.time,c.text,'hover');
      previewOption.onmouseleave=hidePreview;
      ctx.onmouseleave=hidePreview;
  };

  div.onmouseleave=e=>{setTimeout(()=>{if(!document.getElementById('contextMenu').matches(':hover')) hidePreview();},50);};

  comContainer.appendChild(div);
 });

 db.annotations.filter(a=>a.vid===db.current).forEach(a=>{
  let m=document.createElement('div'); 
  m.className='marker'; 
  m.style.left=(a.time/db.videos[a.vid].duration*100)+'%';
  m.onmousemove=e=>{
      let c=db.comments[db.current].find(cc=>cc.time===a.time); 
      if(c) preview(e,db.current,a.time,c.text,'hover');
  };
  m.onmouseleave=hidePreview;
  scrubber.appendChild(m);
 });
}

function openTab(name,btn){['playlist','comments','other'].forEach(t=>document.getElementById(t).style.display=(t===name?'block':'none')); document.querySelectorAll('.tab-buttons button').forEach(b=>b.classList.remove('active')); btn.classList.add('active');}
function onYouTubeIframeAPIReady(){
    init();
}

function init(){
    loadVideo(db.current, 0, false, 'player');
}
